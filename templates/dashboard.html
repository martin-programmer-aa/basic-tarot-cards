<!DOCTYPE html>
<html>
<head>
    <title>Tarot Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="navbar">
        <h1>✨ Welcome {{ user }}</h1>

        <a class="logout-btn" href="/logout">Logout</a>
    </div>

    <div class="main-container">

        <h2 class="title">Mystical Tarot Reading</h2>

        <div class="button-group">
            <button onclick="loadCards()">Load All Cards</button>

            <button onclick="drawRandomCard()">
                Draw Random Card
            </button>
        </div>

        <!-- Random Card Area -->
        <div id="random-card-container"></div>

        <!-- All Cards Area -->
        <div id="card-container"></div>

    </div>

    <script src="/static/script.js"></script>

</body>
</html>
